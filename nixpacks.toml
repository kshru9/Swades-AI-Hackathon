# Used by Railway (Nixpacks) so `bun` is on PATH for `apps/server` start.
# Safe for other hosts: ignored unless Nixpacks runs.

[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npx turbo run build --filter=server"]

[start]
cmd = "bun ./apps/server/dist/index.mjs"
